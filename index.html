<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Cooldowns</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --border: #334155;
            --font-main: 'Inter', sans-serif;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            border-bottom: 1px solid var(--border);
            background-color: rgba(15, 23, 42, 0.9);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(8px);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn {
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Main Content */
        main {
            padding: 2rem 5%;
            flex: 1;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* Cards */
        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            border-color: var(--text-secondary);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .card-header i {
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .card-email {
            font-size: 1.1rem;
            font-weight: 600;
            word-break: break-all;
        }

        .card-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 8px;
        }

        .status-icon {
            font-size: 1.2rem;
        }

        .status-wait {
            color: var(--text-secondary);
        }

        .status-success {
            color: var(--success);
        }

        .countdown {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .countdown.ready {
            color: var(--success);
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .btn-icon {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            padding: 0.4rem;
            border-radius: 6px;
        }

        .btn-icon:hover {
            background-color: var(--border);
            color: var(--text-primary);
        }

        .btn-icon.delete:hover {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: var(--bg-card);
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            transform: scale(0.95);
            opacity: 0;
            transition: var(--transition);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
            opacity: 1;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-modal {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .close-modal:hover {
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background-color: var(--border);
            box-shadow: none;
        }
        
        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .empty-state p {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-clock-rotate-left"></i> Cooldowns</h1>
        <button class="btn" id="btn-new-account">
            <i class="fa-solid fa-plus"></i> Nueva Cuenta
        </button>
    </header>

    <main>
        <div class="grid-container" id="cards-container">
            <!-- Cards will be injected here via JS -->
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Registrar Cuenta</h2>
                <button class="close-modal" id="btn-close-modal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form id="account-form">
                <input type="hidden" id="account-id">
                <div class="form-group">
                    <label for="email"><i class="fa-solid fa-envelope"></i> Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="form-group time-grid">
                    <div>
                        <label for="days">Días</label>
                        <input type="number" id="days" class="form-control" min="0" value="0" required>
                    </div>
                    <div>
                        <label for="hours">Horas</label>
                        <input type="number" id="hours" class="form-control" min="0" max="23" value="0" required>
                    </div>
                    <div>
                        <label for="minutes">Minutos</label>
                        <input type="number" id="minutes" class="form-control" min="0" max="59" value="0" required>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="btn-cancel">Cancelar</button>
                    <button type="submit" class="btn"><i class="fa-solid fa-check"></i> Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // State
        let accounts = JSON.parse(localStorage.getItem('cooldown_accounts')) || [];

        // DOM Elements
        const container = document.getElementById('cards-container');
        const modal = document.getElementById('modal');
        const form = document.getElementById('account-form');
        const btnNew = document.getElementById('btn-new-account');
        const btnClose = document.getElementById('btn-close-modal');
        const btnCancel = document.getElementById('btn-cancel');
        const modalTitle = document.getElementById('modal-title');
        
        // Inputs
        const inputId = document.getElementById('account-id');
        const inputEmail = document.getElementById('email');
        const inputDays = document.getElementById('days');
        const inputHours = document.getElementById('hours');
        const inputMinutes = document.getElementById('minutes');

        // Render Cards
        function renderCards() {
            if (accounts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-inbox"></i>
                        <p>No hay cuentas registradas. Agrega una nueva para comenzar.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = accounts.map(acc => {
                return `
                <div class="card" id="card-${acc.id}">
                    <div class="card-header">
                        <i class="fa-solid fa-user-circle"></i>
                        <span class="card-email">${acc.email}</span>
                    </div>
                    <div class="card-body">
                        <div class="status-icon" id="icon-${acc.id}">
                            <i class="fa-solid fa-hourglass-half status-wait"></i>
                        </div>
                        <div class="countdown" id="timer-${acc.id}">
                            00d 00h 00m 00s
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-icon" onclick="openEditModal('${acc.id}')" title="Editar">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="btn-icon delete" onclick="deleteAccount('${acc.id}')" title="Eliminar">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
                `;
            }).join('');
            
            updateTimers();
        }

        // Save to LocalStorage
        function saveAccounts() {
            localStorage.setItem('cooldown_accounts', JSON.stringify(accounts));
        }

        // Generate ID
        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        // Format Time
        function pad(num) {
            return num.toString().padStart(2, '0');
        }

        // Update Timers Logic
        function updateTimers() {
            const now = new Date().getTime();
            
            accounts.forEach(acc => {
                const timerEl = document.getElementById(`timer-${acc.id}`);
                const iconEl = document.getElementById(`icon-${acc.id}`);
                
                if (!timerEl || !iconEl) return;
                
                const distance = acc.targetTime - now;
                
                if (distance <= 0) {
                    timerEl.textContent = '00d 00h 00m 00s';
                    timerEl.classList.add('ready');
                    iconEl.innerHTML = '<i class="fa-solid fa-circle-check status-success"></i>';
                } else {
                    const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((distance % (1000 * 60)) / 1000);
                    
                    timerEl.textContent = `${pad(d)}d ${pad(h)}h ${pad(m)}m ${pad(s)}s`;
                    timerEl.classList.remove('ready');
                    iconEl.innerHTML = '<i class="fa-solid fa-hourglass-half status-wait"></i>';
                }
            });
        }

        // Interval
        setInterval(updateTimers, 1000);

        // Modal Functions
        function openModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            form.reset();
            inputId.value = '';
        }

        function openEditModal(id) {
            const acc = accounts.find(a => a.id === id);
            if (!acc) return;
            
            modalTitle.textContent = 'Editar Cuenta';
            inputId.value = acc.id;
            inputEmail.value = acc.email;
            
            // Edit logic rule: time fields must be 0 ready for new cooldown
            inputDays.value = 0;
            inputHours.value = 0;
            inputMinutes.value = 0;
            
            openModal();
        }

        // Delete Account
        window.deleteAccount = function(id) {
            if(confirm('¿Estás seguro de que deseas eliminar esta cuenta?')) {
                accounts = accounts.filter(a => a.id !== id);
                saveAccounts();
                renderCards();
            }
        }

        // Event Listeners
        btnNew.addEventListener('click', () => {
            modalTitle.textContent = 'Registrar Cuenta';
            form.reset();
            inputId.value = '';
            // Defaults
            inputDays.value = 0;
            inputHours.value = 0;
            inputMinutes.value = 0;
            openModal();
        });

        btnClose.addEventListener('click', closeModal);
        btnCancel.addEventListener('click', closeModal);

        // Close modal on click outside
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Form Submit
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = inputEmail.value.trim();
            const days = parseInt(inputDays.value) || 0;
            const hours = parseInt(inputHours.value) || 0;
            const minutes = parseInt(inputMinutes.value) || 0;
            
            const totalMs = (days * 24 * 60 * 60 * 1000) + 
                            (hours * 60 * 60 * 1000) + 
                            (minutes * 60 * 1000);
                            
            const targetTime = new Date().getTime() + totalMs;
            
            const id = inputId.value;
            
            if (id) {
                // Edit
                const index = accounts.findIndex(a => a.id === id);
                if (index !== -1) {
                    accounts[index].email = email;
                    accounts[index].targetTime = targetTime;
                }
            } else {
                // Add
                accounts.push({
                    id: generateId(),
                    email: email,
                    targetTime: targetTime
                });
            }
            
            saveAccounts();
            renderCards();
            closeModal();
        });

        // Initial Render
        renderCards();
    </script>
</body>
</html>
